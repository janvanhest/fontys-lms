<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">Ishikawa-diagram - Oorzaakanalyse kernprobleem</text>

  <!-- Main spine -->
  <line x1="80" y1="350" x2="1030" y2="350" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Effect box -->
  <rect x="1030" y="285" width="160" height="130" rx="6" fill="#dc2626" opacity="0.9"/>
  <text x="1110" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="white">De leerervaring in</text>
  <text x="1110" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Canvas is module-</text>
  <text x="1110" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="white">gericht en ondersteunt</text>
  <text x="1110" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="white">vraaggestuurd</text>
  <text x="1110" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="white">onderwijs niet</text>

  <!-- Category 1: Systeem/Techniek (top-left) -->
  <line x1="230" y1="100" x2="330" y2="350" stroke="#2563eb" stroke-width="2"/>
  <rect x="120" y="60" width="180" height="32" rx="4" fill="#2563eb"/>
  <text x="210" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Systeem / Techniek</text>
  <!-- Causes -->
  <line x1="150" y1="130" x2="255" y2="175" stroke="#2563eb" stroke-width="1.2"/>
  <text x="145" y="128" text-anchor="end" font-size="11" fill="#374151">Zoekfunctie hapert,</text>
  <text x="145" y="142" text-anchor="end" font-size="11" fill="#374151">studenten vinden niks</text>
  <line x1="170" y1="175" x2="270" y2="210" stroke="#2563eb" stroke-width="1.2"/>
  <text x="165" y="173" text-anchor="end" font-size="11" fill="#374151">Tools versnipperd zonder</text>
  <text x="165" y="187" text-anchor="end" font-size="11" fill="#374151">onderlinge samenhang</text>
  <line x1="140" y1="220" x2="285" y2="250" stroke="#2563eb" stroke-width="1.2"/>
  <text x="135" y="218" text-anchor="end" font-size="11" fill="#374151">Canvas structuur dwingt</text>
  <text x="135" y="232" text-anchor="end" font-size="11" fill="#374151">modulelijst als navigatie</text>
  <line x1="190" y1="265" x2="300" y2="290" stroke="#2563eb" stroke-width="1.2"/>
  <text x="185" y="263" text-anchor="end" font-size="11" fill="#374151">Geen plek om eigen week</text>
  <text x="185" y="277" text-anchor="end" font-size="11" fill="#374151">rondom activiteiten te plannen</text>

  <!-- Category 2: Content / Informatie (top-middle) -->
  <line x1="500" y1="100" x2="560" y2="350" stroke="#059669" stroke-width="2"/>
  <rect x="410" y="60" width="180" height="32" rx="4" fill="#059669"/>
  <text x="500" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Content / Informatie</text>
  <!-- Causes -->
  <line x1="420" y1="130" x2="518" y2="185" stroke="#059669" stroke-width="1.2"/>
  <text x="415" y="128" text-anchor="end" font-size="11" fill="#374151">Overwegend tekst-gebaseerd</text>
  <line x1="440" y1="180" x2="528" y2="225" stroke="#059669" stroke-width="1.2"/>
  <text x="435" y="178" text-anchor="end" font-size="11" fill="#374151">Studenten lezen steeds</text>
  <text x="435" y="192" text-anchor="end" font-size="11" fill="#374151">slechter</text>
  <line x1="430" y1="230" x2="538" y2="265" stroke="#059669" stroke-width="1.2"/>
  <text x="425" y="228" text-anchor="end" font-size="11" fill="#374151">Informatie verspreid over</text>
  <text x="425" y="242" text-anchor="end" font-size="11" fill="#374151">meerdere systemen</text>
  <line x1="460" y1="275" x2="548" y2="300" stroke="#059669" stroke-width="1.2"/>
  <text x="455" y="273" text-anchor="end" font-size="11" fill="#374151">AI-tool competentiemapping</text>
  <text x="455" y="287" text-anchor="end" font-size="11" fill="#374151">spuugt te veel tekst uit</text>

  <!-- Category 3: Onderwijsstructuur (top-right) -->
  <line x1="770" y1="100" x2="790" y2="350" stroke="#d97706" stroke-width="2"/>
  <rect x="680" y="60" width="180" height="32" rx="4" fill="#d97706"/>
  <text x="770" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Onderwijsstructuur</text>
  <!-- Causes -->
  <line x1="700" y1="130" x2="778" y2="195" stroke="#d97706" stroke-width="1.2"/>
  <text x="695" y="128" text-anchor="end" font-size="11" fill="#374151">Studenten werken niet</text>
  <text x="695" y="142" text-anchor="end" font-size="11" fill="#374151">lineair door modules</text>
  <line x1="710" y1="190" x2="782" y2="240" stroke="#d97706" stroke-width="1.2"/>
  <text x="705" y="188" text-anchor="end" font-size="11" fill="#374151">Challenges varieren van</text>
  <text x="705" y="202" text-anchor="end" font-size="11" fill="#374151">3 weken tot 3 jaar</text>
  <line x1="720" y1="245" x2="786" y2="280" stroke="#d97706" stroke-width="1.2"/>
  <text x="715" y="243" text-anchor="end" font-size="11" fill="#374151">Competentieframeworks</text>
  <text x="715" y="257" text-anchor="end" font-size="11" fill="#374151">verschillen per opleiding</text>
  <line x1="730" y1="290" x2="789" y2="315" stroke="#d97706" stroke-width="1.2"/>
  <text x="725" y="288" text-anchor="end" font-size="11" fill="#374151">Ervaring is voor iedereen</text>
  <text x="725" y="302" text-anchor="end" font-size="11" fill="#374151">hetzelfde, geen personalisatie</text>

  <!-- Category 4: Studentgedrag (bottom-left) -->
  <line x1="230" y1="600" x2="360" y2="350" stroke="#7c3aed" stroke-width="2"/>
  <rect x="120" y="608" width="180" height="32" rx="4" fill="#7c3aed"/>
  <text x="210" y="629" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Studentgedrag</text>
  <!-- Causes -->
  <line x1="150" y1="570" x2="270" y2="510" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="145" y="573" text-anchor="end" font-size="11" fill="#374151">Vragen de docent i.p.v.</text>
  <text x="145" y="587" text-anchor="end" font-size="11" fill="#374151">het systeem te gebruiken</text>
  <line x1="170" y1="515" x2="295" y2="470" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="165" y="518" text-anchor="end" font-size="11" fill="#374151">Workshops niet bezocht</text>
  <text x="165" y="532" text-anchor="end" font-size="11" fill="#374151">door wie het nodig heeft</text>
  <line x1="190" y1="465" x2="325" y2="425" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="185" y="468" text-anchor="end" font-size="11" fill="#374151">Activiteit na eerste</text>
  <text x="185" y="482" text-anchor="end" font-size="11" fill="#374151">weken neemt af</text>
  <line x1="210" y1="420" x2="340" y2="390" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="205" y="423" text-anchor="end" font-size="11" fill="#374151">Studenten weten niet hoe</text>
  <text x="205" y="437" text-anchor="end" font-size="11" fill="#374151">werk als bewijs te gebruiken</text>

  <!-- Category 5: Docent / Coach (bottom-middle) -->
  <line x1="500" y1="600" x2="590" y2="350" stroke="#be185d" stroke-width="2"/>
  <rect x="410" y="608" width="180" height="32" rx="4" fill="#be185d"/>
  <text x="500" y="629" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Docent / Coach</text>
  <!-- Causes -->
  <line x1="420" y1="570" x2="555" y2="500" stroke="#be185d" stroke-width="1.2"/>
  <text x="415" y="573" text-anchor="end" font-size="11" fill="#374151">Beantwoorden herhaaldelijk</text>
  <text x="415" y="587" text-anchor="end" font-size="11" fill="#374151">dezelfde vragen</text>
  <line x1="440" y1="515" x2="565" y2="455" stroke="#be185d" stroke-width="1.2"/>
  <text x="435" y="518" text-anchor="end" font-size="11" fill="#374151">Overzicht houden is</text>
  <text x="435" y="532" text-anchor="end" font-size="11" fill="#374151">arbeidsintensief</text>
  <line x1="460" y1="460" x2="575" y2="415" stroke="#be185d" stroke-width="1.2"/>
  <text x="455" y="463" text-anchor="end" font-size="11" fill="#374151">Verschil dag/avond in</text>
  <text x="455" y="477" text-anchor="end" font-size="11" fill="#374151">contactintensiteit</text>

  <!-- Category 6: Markt / Leverancier (bottom-right) -->
  <line x1="770" y1="600" x2="810" y2="350" stroke="#92400e" stroke-width="2"/>
  <rect x="680" y="608" width="180" height="32" rx="4" fill="#92400e"/>
  <text x="770" y="629" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Markt / Leverancier</text>
  <!-- Causes -->
  <line x1="700" y1="570" x2="800" y2="505" stroke="#92400e" stroke-width="1.2"/>
  <text x="695" y="573" text-anchor="end" font-size="11" fill="#374151">LMS-markt richt zich</text>
  <text x="695" y="587" text-anchor="end" font-size="11" fill="#374151">op klassiek onderwijs</text>
  <line x1="720" y1="515" x2="805" y2="455" stroke="#92400e" stroke-width="1.2"/>
  <text x="715" y="518" text-anchor="end" font-size="11" fill="#374151">Canvas beweegt moeizaam</text>
  <text x="715" y="532" text-anchor="end" font-size="11" fill="#374151">richting vraaggestuurd</text>
  <line x1="740" y1="460" x2="808" y2="415" stroke="#92400e" stroke-width="1.2"/>
  <text x="735" y="463" text-anchor="end" font-size="11" fill="#374151">Vraaggestuurd onderwijs</text>
  <text x="735" y="477" text-anchor="end" font-size="11" fill="#374151">is nog een niche</text>
</svg>
